name: workbench-frontend

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: capstone-frontend
    ports:
      - "7634:7634"
    env_file:
      - .env
    networks:
      - shared-backend-net
    restart: unless-stopped

networks:
  shared-backend-net:
    external: true
    name: workbench_default
